services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: momentra-api:latest
    container_name: momentra-api
    restart: unless-stopped
    ports:
      - "6000:6000"
    env_file:
      - .env
    environment:
      FIREBASE_CREDENTIALS_PATH: /run/secrets/firebase.json
    volumes:
      - ./secrets/firebase-service-account.json:/run/secrets/firebase.json:ro
