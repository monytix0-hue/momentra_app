# Dockge: set the project stack directory to this folder (`backend/`) so `build.context: .`
# and paths like `./secrets/...` resolve next to this file.
#
# Default stack: no Firebase file mount — use FIREBASE_SERVICE_ACCOUNT_JSON in `.env` (one line).
# For file-based credentials instead, merge docker-compose.firebase-file.yml (see .env.example).

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: momentra-api:latest
    container_name: momentra-api
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - .env
