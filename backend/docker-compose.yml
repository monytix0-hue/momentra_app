version: "1.0.1"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: momentra-api:latest
    container_name: momentra-api
    restart: unless-stopped
    ports:
      - "6000:6000"
    env_file:
      - .env
    # File-based Firebase only: uncomment and add FIREBASE_CREDENTIALS_PATH=/run/secrets/firebase.json
    # to .env, with JSON at ./secrets/firebase-service-account.json next to this file.
    # volumes:
    #   - ./secrets/firebase-service-account.json:/run/secrets/firebase.json:ro
